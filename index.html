
<!DOCTYPE html>
<html>
<head>
<title>Yadunandan ❤️ Manushree H.P Royal Wedding</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
linear-gradient(#21002f,#800020,#ffb347);
color:white;
display:flex;
justify-content:center;
align-items:center;
}


/* cinematic opening */

.intro{
position:fixed;
inset:0;
background:#120018;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
color:#ffd700;
z-index:10;
animation:intro 5s forwards;
}

@keyframes intro{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}


.card{

width:95%;
max-width:450px;
padding:25px;
text-align:center;

background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:
0 0 30px gold;

animation:zoom 2s;
}


@keyframes zoom{
from{
transform:scale(.2);
}
to{
transform:scale(1);
}
}


h1{
font-size:32px;
color:#ffd700;
text-shadow:0 0 20px white;
}


h2{
margin:15px;
}


.mandap{

font-size:70px;
animation:float 3s infinite;

}


@keyframes float{
50%{
transform:translateY(-15px);
}
}



/* Avatar */


.couple{

display:flex;
justify-content:center;
gap:35px;
margin:20px;

}


.avatar{

position:relative;

}


.face{

width:85px;
height:85px;

background:#ffd0a3;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:30px;

box-shadow:0 0 20px gold;

animation:bounce 3s infinite;

}


@keyframes bounce{

50%{
transform:translateY(-15px);
}

}



.bride .dress{

width:100px;
height:100px;

background:
linear-gradient(#ff0080,#ffd700);

border-radius:60px 60px 20px 20px;

}



.groom .dress{

width:100px;
height:100px;

background:
linear-gradient(#111,#555);

border-radius:60px 60px 20px 20px;

}



.crown{

font-size:35px;

}



/* Fireworks */


.fire{

position:absolute;

font-size:35px;

animation:boom 3s infinite;

}


@keyframes boom{

0%{
transform:scale(.2);
opacity:0;
}

50%{
transform:scale(2);
opacity:1;
}

100%{
opacity:0;
}

}


.f1{top:10%;left:10%}
.f2{top:20%;right:10%}
.f3{bottom:15%;left:20%}
.f4{bottom:20%;right:20%}




button{

padding:12px 25px;

border:none;

border-radius:30px;

background:#ffd700;

font-size:17px;

}



#count{

margin:15px;

color:#fff;

}

.heart{

position:absolute;

animation:heart 7s linear infinite;

}


@keyframes heart{

from{
top:-20px;
}

to{
top:100%;
}

}

</style>

</head>


<body>


<div class="intro">
✨ Royal Wedding ✨
</div>


<div class="fire f1">🎆</div>
<div class="fire f2">🎇</div>
<div class="fire f3">✨</div>
<div class="fire f4">🎆</div>



<div class="card">


<div class="mandap">
🛕
</div>


<h1>
💍 Wedding Invitation
</h1>


<div class="couple">


<div class="avatar bride">

<div class="crown">👑</div>

<div class="face">
😊
</div>

<div class="dress"></div>

</div>



<div class="avatar groom">

<div class="crown">
👑
</div>

<div class="face">
😊
</div>

<div class="dress"></div>

</div>


</div>



<h2>
Yadunandan ❤️ Manushree H.P
</h2>


<p>
Two souls, one heart and a lifetime of love ✨
</p>


<h3>
📅 14 July 2026
</h3>


<div id="count">
Loading...
</div>



<button onclick="playMusic()">
🎵 Play Wedding Music
</button>


<audio id="music" loop>
<source src="wedding.mp3">
</audio>



</div>




<script>


let date =
new Date("July 14,2026 10:00:00").getTime();


setInterval(()=>{

let now=new Date().getTime();

let gap=date-now;


let d=Math.floor(gap/(1000*60*60*24));

let h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));

let m=Math.floor((gap%(1000*60*60))/(1000*60));

let s=Math.floor((gap%(1000*60))/1000);



document.getElementById("count").innerHTML=
"⏳ "+d+" Days "+h+" Hours "+m+" Minutes "+s+" Seconds";


},1000);



function playMusic(){

document.getElementById("music").play();

}



// floating hearts

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.fontSize=
20+Math.random()*30+"px";

document.body.appendChild(h);


setTimeout(()=>{
h.remove();
},7000);


},500);



</script>


</body>
</html>
